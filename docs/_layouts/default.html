<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      themeVariables: {
        background:        '#1a1f2e',
        primaryColor:      '#2E3440',
        primaryTextColor:  '#D8DEE9',
        primaryBorderColor:'#4C566A',
        lineColor:         '#5E81AC',
        secondaryColor:    '#3B4252',
        tertiaryColor:     '#242933',
        edgeLabelBackground:'#242933',
        nodeTextColor:     '#D8DEE9',
        clusterBkg:        '#242933',
        titleColor:        '#88C0D0',
        fontFamily:        'ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace',
        fontSize:          '14px'
      }
    });
  </script>
  <!-- Rouge syntax highlighting overridden by CSS -->
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-brand" href="{{ '/' | relative_url }}">⚡ olympus</a>
      <div class="nav-links">
        <a href="{{ '/architecture' | relative_url }}">Architecture</a>
        <a href="{{ '/pantheon' | relative_url }}">Modules</a>
        <a href="{{ '/governance' | relative_url }}">Governance</a>
        <a href="{{ '/apis' | relative_url }}">APIS Standard</a>
        <a href="https://github.com/convergent-systems-co/olympus">GitHub</a>
        <a class="nav-cta" href="{{ '/#install' | relative_url }}">Install</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span>⚡ olympus</span>
      <span class="footer-sep">·</span>
      <span>BSL-1.1 License</span>
      <span class="footer-sep">·</span>
      <a href="https://github.com/convergent-systems-co">Convergent Systems</a>
    </div>
  </footer>

</body>
</html>
