name: Bug Report
description: Something isn't working as expected.
labels: ["type/bug", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this. Please fill out the sections below so we can investigate quickly.

        Public issues filed here are treated as product intake. They route inward to our internal coordination pipeline for triage and execution. Internal implementation details are not mirrored back out automatically.

  - type: input
    id: version
    attributes:
      label: Olympus version
      description: Run `olympus --version` and paste the output.
      placeholder: "e.g. 1.4.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you expect vs. what actually happened?
      placeholder: "When I run X, I expect Y but instead Z happens."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `olympus`
        2. Type `...`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages, stack traces, or terminal output. This will be formatted as code automatically.
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Impact
      description: How much does this affect your workflow?
      options:
        - Blocks my work entirely
        - Significant — I have a workaround but it's painful
        - Minor — cosmetic or edge case
    validations:
      required: true

  - type: checkboxes
    id: affected_surfaces
    attributes:
      label: Affected surfaces
      description: Pick every surface that appears involved. This helps us route the report internally.
      options:
        - label: CLI
        - label: API / auth / billing backend
        - label: Web / site / dashboard
        - label: IDE / desktop
        - label: Infra / deployment / environment
        - label: Documentation / product claims
        - label: Not sure
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: If relevant, share your routing or governance config (redact any API keys).
      render: yaml
