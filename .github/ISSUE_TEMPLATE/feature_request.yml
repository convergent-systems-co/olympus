name: Feature Request
description: Suggest a new capability or improvement.
labels: ["type/feature", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate feature requests — they help us build what matters most. Please describe the problem you're trying to solve, not just the solution you'd like.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point or limitation you're experiencing.
      placeholder: "When I'm working on X, I need to Y but currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like Olympus to handle this? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds? Are there other approaches you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Which part of Olympus does this relate to?
      options:
        - Routing (Iris) — model selection, providers, cost
        - Governance (Aegis) — reviews, security, panels
        - Intent validation (Athena) — specs, completion checks
        - Memory (Mnemosyne) — persistence, session recovery
        - Code & files (Hephaestus) — generation, branches, conflicts
        - Monitoring (Argus) — costs, CI, metrics
        - Cost protection (Cerberus) — spending gates
        - Orchestration (Zeus) — session management, workflows
        - CLI / interface — commands, output, UX
        - Other / not sure
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: How important is this to your workflow?
      options:
        - Critical — I can't adopt Olympus without this
        - High — would significantly improve my experience
        - Nice to have — would be a welcome addition
    validations:
      required: true
