name: Public Intake To Central

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Sync public issue intake to olympus-central
        env:
          ROUTING_TOKEN: ${{ secrets.ROUTING_TOKEN }}
          CENTRAL_REPO: convergent-systems-co/olympus-central
        run: node .github/scripts/sync-public-issue-to-central.mjs
