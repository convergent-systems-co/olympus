name: Sync Issues

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  issue_comment:
    types: [created]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to internal tracker
        uses: actions/github-script@v7
        env:
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_REPO_TOKEN }}
          INTERNAL_REPO: ${{ secrets.INTERNAL_REPO }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const [owner, repo] = process.env.INTERNAL_REPO.split('/');
            const internal = github.getOctokit(process.env.INTERNAL_TOKEN);
            const issue = context.payload.issue;
            const marker = `<!-- sync:${context.repo.repo}#${issue.number} -->`;

            // Find existing synced issue
            const { data: existing } = await internal.rest.issues.listForRepo({
              owner, repo, state: 'all', per_page: 100,
              labels: 'area/infra'
            });
            let target = existing.find(i => i.body && i.body.includes(marker));

            // Build label list — only sync labels that exist on internal repo
            const { data: internalLabels } = await internal.rest.issues.listLabelsForRepo({
              owner, repo, per_page: 100
            });
            const validLabels = new Set(internalLabels.map(l => l.name));
            const labels = issue.labels
              .map(l => l.name)
              .filter(n => validLabels.has(n));

            const origin = `${context.repo.owner}/${context.repo.repo}#${issue.number}`;
            const body = `${marker}\n\n**Source:** ${origin}\n**Reporter:** @${issue.user.login}\n\n---\n\n${issue.body || ''}`;

            if (context.payload.action === 'opened' && !target) {
              // Create new issue
              const { data: created } = await internal.rest.issues.create({
                owner, repo,
                title: issue.title,
                body,
                labels
              });
              core.info(`Created internal issue #${created.number}`);
            } else if (target) {
              // Update existing issue
              const update = {
                owner, repo,
                issue_number: target.number,
                title: issue.title,
                body,
                labels,
                state: issue.state
              };
              await internal.rest.issues.update(update);
              core.info(`Updated internal issue #${target.number}`);

              // Sync comments
              if (context.payload.action === 'created' && context.payload.comment) {
                const comment = context.payload.comment;
                await internal.rest.issues.createComment({
                  owner, repo,
                  issue_number: target.number,
                  body: `**@${comment.user.login}** commented:\n\n${comment.body}`
                });
              }
            }
